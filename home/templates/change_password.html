{% extends 'base.html' %}

{% block title %}Đổi mật khẩu{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Đổi mật khẩu</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Cập nhật mật khẩu</button>
        <a href="{% url 'user_info' %}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
{% endblock %}
